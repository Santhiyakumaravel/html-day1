<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Marksheet</title>
    <h1>Create a Student Marksheet</h1>
</head>
<body>
    <table border="1">
        <thead>
            <!-- Nested table tag removed from here as it was invalid HTML -->
            <tr>
                <th>S.NO</th>
                <th>SUBJECT</th>
                <th>MAX MARKS</th>
                <th>MARKS</th>
                <th>GRADES</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>1</td>
                <td>MATHS</td>
                <td>100</td>
                <td>78</td>
                <td>B</td>
            </tr>
            <tr>
                <td>2</td>
                <td>SCIENCE</td>
                <td>100</td>
                <td>80</td>
                <td>A</td>
            </tr>
            <tr>
                <td>3</td>
                <td>SOCIAL SCIENCE</td>
                <td>100</td>
                <td>85</td>
                <td>A</td>
            </tr>
            <tr>
                <td>4</td>
                <td>TAMIL</td>
                <td>100</td>
                <td>90</td>
                <td>A+</td>
            </tr>
            <tfoot>
        <tr>
            <td colspan="2">TOTAL</td>
            <td>400</td>
            <td>333</td>
            <td></td>
        </tr>
    </tfoot>
        </tbody>
    </table>
   
</body>
</html>
